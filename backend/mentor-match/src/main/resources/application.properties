spring.application.name=mentor-match
server.port=${MENTOR_MATCH_PORT:8082}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/apto}
spring.datasource.username=${DB_USERNAME:apto}
spring.datasource.password=${DB_PASSWORD:apto}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

mentor-match.groq.base-url=https://api.groq.com/openai/v1
mentor-match.groq.model=llama-3.3-70b-versatile
mentor-match.groq.api-key=${GROQ_API_KEY:}
mentor-match.groq.timeout=30s
